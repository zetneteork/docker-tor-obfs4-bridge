name: Build, Push Multi-Arch Docker Image & Release

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 0 * * 1'          # Weekly on Monday at 00:00 UTC, to catch upstream Tor bumps
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-build-and-release
  cancel-in-progress: false

env:
  DOCKERHUB_IMAGE: zetneteork/tor-obfs4-bridge
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build amd64 only, loaded locally, purely to read the Tor version that
      # Debian's apt repo currently resolves to. This decides whether a new
      # version/release is needed before we do the expensive multi-arch push.
      - name: Build amd64 image for version detection
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: local/tor-obfs4-bridge:detect
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Detect installed Tor version
        id: detect
        run: |
          RAW_VERSION=$(docker run --rm local/tor-obfs4-bridge:detect dpkg -s tor | awk '/^Version:/{print $2}')
          if [ -z "$RAW_VERSION" ]; then
            echo "::error::Could not detect Tor version from built image."
            exit 1
          fi
          # Debian package versions may contain characters (: ~ +) that are
          # invalid in git tag names and Docker image tags. Sanitize for use
          # as an identifier, but keep the raw string for display purposes.
          # (See scripts/sanitize-version.sh - unit tested in scripts/test-release-plan.sh.)
          SAFE_VERSION=$(scripts/sanitize-version.sh "$RAW_VERSION")
          echo "Detected Tor version: $RAW_VERSION (tag: $SAFE_VERSION)"
          echo "version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"
          echo "raw_version=$RAW_VERSION" >> "$GITHUB_OUTPUT"

      # A published GitHub release for this Tor version is the only proof the
      # full pipeline (tag + images + release) completed successfully before.
      # A git tag alone is not enough: the tag is pushed early, so a run that
      # fails later (e.g. registry login) would otherwise look "already done"
      # on the next run and skip publishing forever. If no release exists yet
      # we always (re)do the full publish, even if a stale tag is present.
      - name: Determine whether to publish/release
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.detect.outputs.version }}"

          RELEASE_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$NEW_VERSION")
          if [ "$RELEASE_STATUS" = "200" ]; then
            RELEASE_EXISTS=true
          else
            RELEASE_EXISTS=false
          fi

          CODE_CHANGED=false
          if [ "$RELEASE_EXISTS" = "true" ] && git rev-parse -q --verify "refs/tags/$NEW_VERSION" >/dev/null; then
            if ! git diff --quiet "$NEW_VERSION" HEAD -- Dockerfile start-tor.sh get-bridge-line; then
              CODE_CHANGED=true
            fi
          fi

          # See scripts/release-plan.sh - unit tested in scripts/test-release-plan.sh.
          eval "$(scripts/release-plan.sh "$RELEASE_EXISTS" "$CODE_CHANGED")"

          echo "Version=$NEW_VERSION ReleaseExists=$RELEASE_EXISTS CodeChanged=$CODE_CHANGED ShouldPublish=$should_publish ShouldRelease=$should_release"
          {
            echo "version=$NEW_VERSION"
            echo "should_publish=$should_publish"
            echo "should_release=$should_release"
          } >> "$GITHUB_OUTPUT"

      # docker/login-action fails with an opaque "cannot perform an
      # interactive login" error when the username/password it receives are
      # empty, which is what happens if DOCKERHUB_USERNAME/DOCKERHUB_TOKEN
      # are configured as *environment* secrets rather than *repository*
      # secrets (this job doesn't declare an `environment:`, so it can't see
      # environment-scoped secrets - they resolve to ""). Fail fast here with
      # an actionable message instead of that generic error.
      - name: Verify Docker Hub credentials are present
        if: steps.plan.outputs.should_publish == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DOCKERHUB_USERNAME and/or DOCKERHUB_TOKEN are empty in this job. Make sure both are set as *repository* secrets (Settings > Secrets and variables > Actions > Repository secrets tab), not secrets scoped to a GitHub Environment - this job has no 'environment:' key, so environment secrets are invisible to it and resolve to an empty string."
            exit 1
          fi
          echo "Docker Hub credentials are present (values masked)."

      - name: Log in to Docker Hub
        if: steps.plan.outputs.should_publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: steps.plan.outputs.should_publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        if: steps.plan.outputs.should_publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.plan.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.plan.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest

      - name: Cleanup old Docker Hub tags (keep latest 10)
        if: steps.plan.outputs.should_publish == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ env.DOCKERHUB_IMAGE }}
        run: |
          echo "Fetching list of tags for $REPO..."
          TOKEN=$(curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"username\": \"${DOCKERHUB_USERNAME}\", \"password\": \"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "::error::Failed to authenticate with Docker Hub."
            exit 1
          fi

          # Fetch all tags except 'latest', sorted by version, descending.
          TAGS=$(curl -s -H "Authorization: JWT $TOKEN" \
            "https://hub.docker.com/v2/repositories/$REPO/tags/?page_size=100" \
            | jq -r '.results[].name' | grep -v '^latest$' | sort -rV)

          echo "All version tags:"
          echo "$TAGS"

          # Keep the latest 10, delete the rest.
          TO_DELETE=$(echo "$TAGS" | tail -n +11)

          if [ -z "$TO_DELETE" ]; then
            echo "Nothing to delete - 10 or fewer versioned tags present."
          else
            echo "Deleting old tags:"
            echo "$TO_DELETE"
            for TAG in $TO_DELETE; do
              echo "Deleting $REPO:$TAG"
              curl -s -X DELETE -H "Authorization: JWT $TOKEN" \
                "https://hub.docker.com/v2/repositories/$REPO/tags/$TAG/" > /dev/null
            done
          fi

      # Only touch the repo's tracked files once the multi-arch image has
      # actually been built and pushed successfully - keeps export.sh /
      # docker-compose.yml / kube-deployment.yml from ever referencing a
      # version that isn't really published, mirroring how version bumps
      # were previously done by hand.
      - name: Bump version in tracked files and tag
        if: steps.plan.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.plan.outputs.version }}"

          sed -i "s/^export VERSION=.*/export VERSION=${VERSION}/" export.sh
          sed -i "s#image: ${DOCKERHUB_IMAGE}:.*#image: ${DOCKERHUB_IMAGE}:${VERSION}#" docker-compose.yml kube-deployment.yml

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add export.sh docker-compose.yml kube-deployment.yml
            git commit -m "${VERSION}"
            git push origin HEAD:master
          fi

          # -f/--force: a prior run may have already pushed this tag before
          # failing at a later step; re-pointing it at the current commit is
          # safe since no release has been published under it yet (that's
          # the precondition for should_release=true).
          git tag -f "${VERSION}"
          git push --force origin "refs/tags/${VERSION}"

      - name: Create GitHub release
        if: steps.plan.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.plan.outputs.version }}
          RAW_VERSION: ${{ steps.detect.outputs.raw_version }}
        run: |
          echo "Creating GitHub release ${VERSION}"
          body=$(cat <<EOF
          Multi-arch build (amd64, arm64, armhf) of Tor ${RAW_VERSION}.

          Images:
          - \`docker.io/${DOCKERHUB_IMAGE}:${VERSION}\`
          - \`ghcr.io/${{ github.repository }}:${VERSION}\`
          EOF
          )
          payload=$(jq -n --arg tag "$VERSION" \
                         --arg name "Release $VERSION" \
                         --arg body "$body" \
                         '{ tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false }')
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | jq -r '.html_url // "no url returned (maybe an error)"'
